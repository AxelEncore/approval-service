services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: approval
      POSTGRES_PASSWORD: approval
      POSTGRES_DB: approval
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U approval -d approval"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg2://approval:approval@db:5432/approval
      LOG_LEVEL: INFO
      ENVIRONMENT: docker
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  pgdata:
